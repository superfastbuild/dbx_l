name: "🐞 Bug Report / 问题反馈"
description: Crashes, connection failures, query errors, display bugs, or other reproducible issues. / 程序崩溃、连接失败、查询异常、界面显示错误或其他可复现问题。
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。涉及敏感信息请脱敏。请尽量提供数据库类型、版本、复现步骤、截图和错误日志。
        DBX 版本、运行环境、操作系统和系统架构可在应用内通过“设置 → 关于我们 → 复制支持信息”一键复制。

  - type: input
    id: database
    attributes:
      label: 数据库类型和版本
      description: 例如 PostgreSQL 16、MySQL 8.0、Redis 7.2。
      placeholder: "例如：PostgreSQL 16.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请按下面的清单逐项填写，截图和错误日志尤其重要。
      placeholder: |
        1. 复现步骤：新建连接 → 填写信息 → 点击保存
        2. 期望结果：能正常展开 schema
        3. 实际结果：一直 loading，无错误提示
        4. 最好附上截图和错误日志（设置 → 外观 → 启用"启用调试日志" → 复现问题 → 点击"下载日志"，将内容粘贴到这里）
    validations:
      required: true

  - type: textarea
    id: support-info
    attributes:
      label: 支持信息
      description: 打开 DBX 的“设置 → 关于我们”，点击“复制支持信息”，然后粘贴到这里。如无法打开应用，请说明原因。
      placeholder: |
        DBX 版本：v0.5.52
        运行环境：桌面端
        操作系统：macOS 26.4
        系统架构：aarch64
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（是否紧急）
      description: 紧急 = 希望下个版本优先修。维护者可根据实际情况调整。
      options:
        - "🔴 P0 紧急 · 下个版本必须修"
        - "🟠 P1 重要 · 尽快处理"
        - "🟡 P2 普通 · 按排期处理"
        - "🟢 P3 低优 · 有空再修"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、SQL 样例、连接方式、特殊环境等。
