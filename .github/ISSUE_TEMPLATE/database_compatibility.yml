name: "🔀 Compatibility Issue / 数据库兼容性问题"
description: A specific database, version, or SQL dialect incompatibility. / 某个数据库、版本或 SQL 方言不兼容。
title: "[Compatibility] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        用于收集数据库兼容性细节，例如连接失败、schema 读取不完整、字段类型显示错误等。请脱敏。
        DBX 版本、运行环境、操作系统和系统架构可在应用内通过“设置 → 关于我们 → 复制支持信息”一键复制。

  - type: input
    id: database
    attributes:
      label: 数据库类型和版本
      description: 也请注明发行版，如 MariaDB、AWS RDS、TiDB 等。
      placeholder: "例如：MariaDB 10.11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 什么操作，出了什么错，期望怎样？
      placeholder: "例如：展开 schema 时报错 'unknown type'，期望能正常显示字段。"
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: 错误信息
      render: shell
    validations:
      required: true

  - type: textarea
    id: support-info
    attributes:
      label: 支持信息
      description: 打开 DBX 的“设置 → 关于我们”，点击“复制支持信息”，然后粘贴到这里。如无法打开应用，请说明原因。
      placeholder: |
        DBX 版本：v0.5.52
        运行环境：桌面端
        操作系统：macOS 26.4
        系统架构：aarch64
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 表结构、SQL 样例、截图、部署方式（Docker/云/自建）等。
